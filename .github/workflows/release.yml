name: Release

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: super-release-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: super-release-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: super-release-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: super-release-darwin-aarch64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/super-release dist/super-release
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz super-release
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Build super-release itself to use for the release
      - name: Build super-release
        run: cargo build --release

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Run super-release on itself!
      - name: Run super-release
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ./target/release/super-release

      # Create GitHub release with binaries
      - name: Create GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the tag that was just created
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "No tag found, skipping GitHub release"
            exit 0
          fi

          # Collect all artifacts
          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          find artifacts -name '*.sha256' -exec cp {} release-assets/ \;

          # Create release
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            release-assets/*

      # Publish npm wrapper
      - name: Publish npm wrapper
        if: success()
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Sync version from root package.json to npm/package.json
          VERSION=$(node --input-type=module -e "import {readFileSync} from 'fs'; console.log(JSON.parse(readFileSync('package.json','utf8')).version)")
          if [ "$VERSION" = "0.1.0" ]; then
            echo "No version bump, skipping npm publish"
            exit 0
          fi
          cd npm
          node --input-type=module -e "
            import {readFileSync, writeFileSync} from 'fs';
            const pkg = JSON.parse(readFileSync('package.json','utf8'));
            pkg.version = '${VERSION}';
            writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          pnpm publish --access public --no-git-checks || true
