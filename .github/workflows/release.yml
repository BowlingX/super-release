name: Release

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: ['main', 'master']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  # For the github step's "released" comments and labels on resolved PRs/issues.
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: https://registry.npmjs.org
      - run: pnpm install
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract super-release binary
        run: |
          tar xzf artifacts/super-release-linux-x86_64/super-release-linux-x86_64.tar.gz -C artifacts
          chmod +x artifacts/super-release

      - name: Bundle artifact hashes into npm package
        run: |
          find artifacts -name '*.sha256' -exec cp {} packages/super-release/bin/ \;
          ls -la packages/super-release/bin/*.sha256

      - name: Run super-release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ./artifacts/super-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
