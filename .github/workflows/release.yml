name: Release

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: ['main', 'master']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  # For the github step's "released" comments and labels on resolved PRs/issues.
  issues: write
  pull-requests: write
  # For pushing the Docker image to GHCR.
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: https://registry.npmjs.org
      - run: pnpm install
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract super-release binary
        run: |
          tar xzf artifacts/super-release-linux-x86_64/super-release-linux-x86_64.tar.gz -C artifacts
          chmod +x artifacts/super-release

      - name: Bundle artifact hashes into npm package
        run: |
          find artifacts -name '*.sha256' -exec cp {} packages/super-release/bin/ \;
          ls -la packages/super-release/bin/*.sha256

      - name: Run super-release
        id: run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          before="$(git rev-parse HEAD)"
          ./artifacts/super-release
          if [ "$(git rev-parse HEAD)" != "$before" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Publish the Docker image + move the vN tag, only if a release happened ----

      - name: Resolve image version
        id: img
        if: steps.run.outputs.released == 'true'
        run: |
          v="$(node -p "require('./packages/super-release/package.json').version")"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "major=${v%%.*}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.run.outputs.released == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.run.outputs.released == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.run.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.run.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SR_VERSION=${{ steps.img.outputs.version }}
          tags: |
            ghcr.io/bowlingx/super-release:${{ steps.img.outputs.version }}
            ghcr.io/bowlingx/super-release:v${{ steps.img.outputs.major }}
            ghcr.io/bowlingx/super-release:latest
            ghcr.io/bowlingx/super-release:sha-${{ github.sha }}

      - name: Move major (vN) tag for the Action
        if: steps.run.outputs.released == 'true'
        run: |
          major="v${{ steps.img.outputs.major }}"
          git tag -f "$major"
          git push -f origin "$major"
