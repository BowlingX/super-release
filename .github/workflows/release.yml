name: Release

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: super-release-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: super-release-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: super-release-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: super-release-darwin-aarch64

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu perl make
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --features vendored-openssl

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/super-release dist/super-release
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz super-release
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract super-release binary
        run: |
          tar xzf artifacts/super-release-linux-x86_64/super-release-linux-x86_64.tar.gz
          chmod +x super-release

      - name: Run super-release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ./super-release

      - name: Push release commit and tags
        run: |
          TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "No new release, nothing to push"
            exit 0
          fi
          git push origin HEAD --follow-tags

      - name: Create GitHub Release
        run: |
          TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            exit 0
          fi

          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          find artifacts -name '*.sha256' -exec cp {} release-assets/ \;

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            release-assets/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
