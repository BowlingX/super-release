# yaml-language-server: $schema=https://raw.githubusercontent.com/bowlingx/super-release/v1.2.0/schema.json
# super-release releases itself

branches:
  - main
  - master

tag_format: "v{version}"

exclude:
  - 'super-release-root'

dependencies:
  - pnpm-lock.yaml
  - pnpm-workspace.yaml
  - package.json
  - 'Cargo.toml'
  - 'Cargo.lock'
  - 'src/**'
  - '.release.yaml'
  - '.github/workflows/*.yml'

steps:
  - name: changelog
    packages:
      - "super-release-root"
  - name: npm
    options:
      provenance: true
    packages:
      - 'super-release'
      - 'super-release-darwin-arm64'
      - 'super-release-darwin-x64'
      - 'super-release-linux-arm64'
      - 'super-release-linux-x64'
      - 'super-release-windows-x64'
  - name: exec
    packages:
      - "super-release-root"
    options:
      prepare_cmd: "sed -i'' -e 's/^version = .*/version = \"{version}\"/' Cargo.toml && cargo update super-release"
      files:
        - Cargo.toml
        - Cargo.lock

git:
  commit_message: "chore(release): {releases} [skip ci]"
  push: false
