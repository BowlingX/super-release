# yaml-language-server: $schema=https://raw.githubusercontent.com/BowlingX/super-release/refs/tags/super-release/v1.3.0/schema.json
# super-release releases itself

branches:
  - main
  - master

tag_format: 'v{version}'

dependencies:
  - pnpm-lock.yaml
  - pnpm-workspace.yaml
  - package.json
  - 'Cargo.toml'
  - 'Cargo.lock'
  - 'src/**'
  - '.github/workflows/*.yml'

steps:
  - name: changelog
    packages:
      - 'super-release-root'
  - name: npm
    options:
      provenance: true
    packages:
      - 'super-release'
      - 'super-release-darwin-arm64'
      - 'super-release-darwin-x64'
      - 'super-release-linux-arm64'
      - 'super-release-linux-x64'
      - 'super-release-windows-x64'
  - name: exec
    packages:
      - 'super-release-root'
    options:
      prepare_cmd: 'sed -i'''' -e ''s/^version = .*/version = "{version}"/'' Cargo.toml && cargo update super-release'
      files:
        - Cargo.toml
        - Cargo.lock

git:
  commit_message: 'chore(release): {releases} [skip ci]'
  push: false
